function parse(d){return d.map(function(x){return{date:String(x.trade_date),open:+x.open,close:+x.close,high:+x.high,low:+x.low,vol:+x.vol,amount:+x.amount,pct_chg:+x.pct_chg}}).sort(function(a,b){return a.date.localeCompare(b.date)})}
function fmt(d){return d.slice(0,4)+'-'+d.slice(4,6)+'-'+d.slice(6,8)}
function sma(arr,n){var r=[];for(var i=0;i<arr.length;i++){if(i<n-1)r.push(null);else{var s=0;for(var j=0;j<n;j++)s+=arr[i-j];r.push(+(s/n).toFixed(2))}}return r}

function buildChart(domId, data, ex){
  var dates=data.map(function(d){return fmt(d.date)});
  var ohlc=data.map(function(d){return[d.open,d.close,d.low,d.high]});
  var vols=data.map(function(d){return d.vol});
  var closes=data.map(function(d){return d.close});
  var ma5=sma(closes,5),ma10=sma(closes,10),ma20=sma(closes,20);

  // 构建波峰波谷标记
  var dateIdx={}; dates.forEach(function(d,i){dateIdx[d]=i});
  var marks=[];
  ex.peaks.forEach(function(p){
    var idx=dateIdx[fmt(p.date)];
    if(idx!==undefined){
      marks.push({name:'卖 ¥'+p.price,coord:[idx,p.price],
        itemStyle:{color:'#2ed573'},label:{color:'#fff',formatter:'卖',fontWeight:'bold'},
        symbol:'pin',symbolSize:42});
    }
  });
  ex.troughs.forEach(function(t){
    var idx=dateIdx[fmt(t.date)];
    if(idx!==undefined){
      marks.push({name:'买 ¥'+t.price,coord:[idx,t.price],
        itemStyle:{color:'#ff4757'},label:{color:'#fff',formatter:'买',fontWeight:'bold'},
        symbol:'pin',symbolSize:42});
    }
  });

  var chart=echarts.init(document.getElementById(domId));
  chart.setOption({
    tooltip:{trigger:'axis',axisPointer:{type:'cross'}},
    grid:[{left:'8%',right:'3%',top:50,height:'58%'},{left:'8%',right:'3%',top:'75%',height:'16%'}],
    xAxis:[
      {type:'category',data:dates,axisLabel:{formatter:function(v){return v.slice(5)},interval:Math.floor(dates.length/10),fontSize:11},splitLine:{show:false}},
      {type:'category',gridIndex:1,data:dates,axisLabel:{show:false},splitLine:{show:false}}
    ],
    yAxis:[
      {type:'value',scale:true,axisLabel:{fontSize:11,formatter:function(v){return v.toFixed(0)}},splitLine:{lineStyle:{color:'#eee',type:'dashed'}}},
      {type:'value',gridIndex:1,axisLabel:{show:false},splitLine:{show:false}}
    ],
    dataZoom:[{type:'inside',xAxisIndex:[0,1],start:0,end:100},{type:'slider',xAxisIndex:[0,1],bottom:0,height:20,start:30,end:100}],
    series:[
      {name:'K线',type:'candlestick',data:ohlc,itemStyle:{color:'#ff4757',color0:'#2ed573',borderColor:'#ff4757',borderColor0:'#2ed573'},
        markPoint:{symbol:'pin',symbolSize:42,label:{fontSize:10,distance:3},data:marks}
      },
      {name:'MA5',type:'line',data:ma5,smooth:true,lineStyle:{width:1,color:'#ffa502'},symbol:'none'},
      {name:'MA10',type:'line',data:ma10,smooth:true,lineStyle:{width:1,color:'#ff6b81'},symbol:'none'},
      {name:'MA20',type:'line',data:ma20,smooth:true,lineStyle:{width:1.5,color:'#70a1ff'},symbol:'none'},
      {name:'成交量',type:'bar',xAxisIndex:1,yAxisIndex:1,data:vols.map(function(v,i){return{value:v,itemStyle:{color:data[i].close>=data[i].open?'#ff4757':'#2ed573'}}}),large:true}
    ]
  });
  window.addEventListener('resize',function(){chart.resize()});
}

function buildStats(domId, ex){
  var peaks=ex.peaks,troughs=ex.troughs;
  var strongPeaks=peaks.filter(function(p){return p.confidence==='强'}).length;
  var strongTroughs=troughs.filter(function(t){return t.confidence==='强'}).length;
  document.getElementById(domId).innerHTML=
    '<div class="sm-item"><div class="l">波峰(卖出)</div><div class="v" style="color:#2ed573">'+peaks.length+'</div></div>'+
    '<div class="sm-item"><div class="l">波谷(买入)</div><div class="v" style="color:#ff4757">'+troughs.length+'</div></div>'+
    '<div class="sm-item"><div class="l">强信号波峰</div><div class="v">'+strongPeaks+'</div></div>'+
    '<div class="sm-item"><div class="l">强信号波谷</div><div class="v">'+strongTroughs+'</div></div>';
}

function buildTable(domId, ex, data){
  var points=[];
  ex.peaks.forEach(function(p){points.push({date:p.date,type:'sell',price:p.price,conf:p.confidence,reasons:p.reasons,vol_ratio:p.vol_ratio})});
  ex.troughs.forEach(function(t){points.push({date:t.date,type:'buy',price:t.price,conf:t.confidence,reasons:t.reasons,vol_ratio:t.vol_ratio})});
  points.sort(function(a,b){return a.date.localeCompare(b.date)});

  // 配对计算收益
  var trades=[];
  var entry=null;
  // 严格配对：波谷之后找下一个波峰
  for(var i=0;i<points.length;i++){
    if(points[i].type==='buy'&&entry===null){
      entry=points[i];
    }else if(points[i].type==='sell'&&entry!==null){
      var profit=((points[i].price-entry.price)/entry.price*100);
      trades.push({trough:entry,peak:points[i],profit:profit});
      entry=null;
    }
  }
  // 如果有未配对的买入(当前处于上涨中)
  if(entry!==null){
    trades.push({trough:entry,peak:null,profit:null});
  }

  var html='<thead><tr><th>波谷日期</th><th>买入价</th><th>信号</th><th>波峰日期</th><th>卖出价</th><th>信号</th><th>收益率</th></tr></thead><tbody>';
  trades.forEach(function(tr){
    var buyConfIcon='<span class="conf-dot '+(tr.trough.conf==='强'?'conf-strong':tr.trough.conf==='中'?'conf-mid':'conf-weak')+'"></span>';
    var sellConfIcon=tr.peak?'<span class="conf-dot '+(tr.peak.conf==='强'?'conf-strong':tr.peak.conf==='中'?'conf-mid':'conf-weak')+'"></span>':'';
    var profitHtml='';
    if(tr.profit!==null){
      var color=tr.profit>=0?'color:#ff4757':'color:#2ed573';
      profitHtml='<span style="'+color+';font-weight:700;font-size:15px">'+(tr.profit>=0?'+':'')+tr.profit.toFixed(1)+'%</span>';
    }else{
      profitHtml='<span style="color:#ffa502;font-weight:600">持仓中</span>';
    }
    html+='<tr>'+
      '<td>'+fmt(tr.trough.date)+'</td>'+
      '<td style="font-weight:600;color:#ff4757">¥'+tr.trough.price.toFixed(2)+'</td>'+
      '<td>'+buyConfIcon+'<span class="badge '+tr.trough.conf+'">'+(tr.trough.conf==='强'?'强信号':'')+tr.trough.conf+'</span></td>'+
      '<td>'+(tr.peak?fmt(tr.peak.date):'<span style="color:#ffa502">待出场</span>')+'</td>'+
      '<td style="font-weight:600;color:#2ed573">'+(tr.peak?'¥'+tr.peak.price.toFixed(2):'-')+'</td>'+
      '<td>'+(tr.peak?sellConfIcon+'<span class="badge '+tr.peak.conf+'">'+tr.peak.conf+'</span>':'-')+'</td>'+
      '<td>'+profitHtml+'</td>'+
    '</tr>';
  });

  // 统计
  var closed=trades.filter(function(t){return t.profit!==null});
  var wins=closed.filter(function(t){return t.profit>=0});
  var totalProfit=closed.reduce(function(a,t){return a+t.profit},0);
  html+='<tr style="background:#f8f9fd;font-weight:600">'+
    '<td colspan="6">📊 统计: '+closed.length+'笔交易, 胜率 '+Math.round(wins.length/closed.length*100)+'%, 累计 '+(totalProfit>=0?'+':'')+totalProfit.toFixed(1)+'%</td>'+
    '<td style="color:'+(totalProfit>=0?'#ff4757':'#2ed573')+'">'+(totalProfit>=0?'盈利':'亏损')+'</td></tr>';

  html+='</tbody>';
  document.getElementById(domId).innerHTML=html;
}

function buildInsight(domId, ex){
  var peaks=ex.peaks,troughs=ex.troughs;
  var strongBuy=troughs.filter(function(t){return t.confidence==='强'});
  var strongSell=peaks.filter(function(p){return p.confidence==='强'});

  // 最近一个波谷和波峰
  var all=sorted([].concat(troughs,peaks));
  var lastTrough=null,lastPeak=null;
  for(var i=all.length-1;i>=0;i--){
    if(!lastPeak&&all[i].type==='peak')lastPeak=all[i];
    if(!lastTrough&&all[i].type==='trough')lastTrough=all[i];
  }
  // 判断当前位置
  var status='';
  if(lastTrough&&lastPeak&&lastTrough.date>lastPeak.date){
    status='当前处于<b style="color:#ff4757">上升段</b>（最近波谷 '+fmt(lastTrough.date)+' ¥'+lastTrough.price.toFixed(2)+'），建议持有等待下一个波峰信号';
  }else if(lastPeak&&(!lastTrough||lastPeak.date>lastTrough.date)){
    status='当前处于<b style="color:#2ed573">调整段</b>（最近波峰 '+fmt(lastPeak.date)+' ¥'+lastPeak.price.toFixed(2)+'），关注波谷买入机会';
  }

  var html='';
  html+='<strong>操作策略：</strong>'+status+'<br><br>';
  html+='<strong>信号质量：</strong>共识别 '+troughs.length+' 个波谷买入点 + '+peaks.length+' 个波峰卖出点，';
  html+='其中强信号买入 '+strongBuy.length+' 个，强信号卖出 '+strongSell.length+' 个。<br>';
  html+='<strong>波谷特征：</strong>缩量筑底时买入（地量地价、长下影线支撑）。<br>';
  html+='<strong>波峰特征：</strong>放量见顶时卖出（天量天价、长上影抛压、高位滞涨）。<br><br>';

  if(strongBuy.length>0){
    html+='<strong>近期强信号波谷：</strong><br>';
    var recentStrong=troughs.filter(function(t){return t.confidence==='强'}).slice(-3);
    recentStrong.forEach(function(t){
      html+='• '+fmt(t.date)+' ¥'+t.price.toFixed(2)+' ['+t.reasons.join(', ')+']<br>';
    });
  }
  html+='<br><span style="color:#888;font-size:11px">波峰波谷为事后识别，实际操作需结合实时量价。严格止损，控制仓位。</span>';
  document.getElementById(domId).innerHTML=html;
}

function sorted(arr){
  return arr.sort(function(a,b){return (a.date||'').localeCompare(b.date||'')});
}

// ===== 初始化 =====
var _cache={},_built={};
document.addEventListener('DOMContentLoaded',function(){
  _cache.smic=parse(RAW_SMIC);
  _cache.giga=parse(RAW_GIGA);
  // smic
  buildChart('chart-smic',_cache.smic,EXTREMA.smic);
  buildStats('stats-smic',EXTREMA.smic);
  buildTable('table-smic',EXTREMA.smic,_cache.smic);
  buildInsight('insight-smic',EXTREMA.smic);
  _built.smic=true;
});

function switchTab(tab){
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
  document.querySelectorAll('.tab-panel').forEach(function(p){p.classList.remove('active')});
  document.querySelector('.tab:nth-child('+(tab==='smic'?1:2)+')').classList.add('active');
  document.getElementById('panel-'+tab).classList.add('active');
  if(!_built[tab]){
    setTimeout(function(){
      var d=tab==='smic'?_cache.smic:_cache.giga;
      var e=tab==='smic'?EXTREMA.smic:EXTREMA.gigadevice;
      buildChart('chart-'+tab,d,e);
      buildStats('stats-'+tab,e);
      buildTable('table-'+tab,e,d);
      buildInsight('insight-'+tab,e);
      _built[tab]=true;
    },100);
  }
}
</script>
