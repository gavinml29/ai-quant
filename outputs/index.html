<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Quant 股票仪表盘</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .hero {
      text-align: center;
      padding: 40px;
    }
    .hero h1 {
      font-size: 36px;
      font-weight: 700;
      margin-bottom: 8px;
      background: linear-gradient(90deg, #ff4757, #ff6b81, #70a1ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .hero p {
      color: rgba(255,255,255,0.55);
      font-size: 14px;
      margin-bottom: 40px;
    }
    .cards {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .card {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 32px 40px;
      width: 280px;
      text-decoration: none;
      color: inherit;
      transition: all 0.3s;
      backdrop-filter: blur(10px);
    }
    .card:hover {
      background: rgba(255,255,255,0.12);
      transform: translateY(-4px);
      border-color: rgba(255,255,255,0.25);
    }
    .card h2 {
      font-size: 20px;
      margin-bottom: 6px;
    }
    .card .code {
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      margin-bottom: 12px;
    }
    .card .badge {
      display: inline-block;
      padding: 3px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
    }
    .badge.star { background: rgba(255,71,87,0.2); color: #ff6b81; }
    .badge.main { background: rgba(112,161,255,0.2); color: #70a1ff; }
    .footer {
      margin-top: 48px;
      font-size: 12px;
      color: rgba(255,255,255,0.3);
    }
  </style>
</head>
<body>
<div class="hero">
  <h1>AI Quant · 股票仪表盘</h1>
  <p>Tushare 数据驱动 · 四只A股 量价波段分析</p>
  <div class="cards">
    <a href="smic_dashboard.html" class="card">
      <h2>中芯国际</h2>
      <div class="code">688981.SH</div>
      <span class="badge star">科创板</span>
    </a>
    <a href="gigadevice_dashboard.html" class="card">
      <h2>兆易创新</h2>
      <div class="code">603986.SH</div>
      <span class="badge main">沪市主板</span>
    </a>
    <a href="swing_extrema_dashboard.html" class="card" style="border-color:rgba(255,165,2,0.3)">
      <h2>🏔️ 波峰波谷</h2>
      <div class="code">四股票 · 波段极值</div>
      <span class="badge" style="background:rgba(255,165,2,0.2);color:#ffa502">Zigzag + 量价</span>
    </a>
    <a href="main_force_dashboard.html" class="card" style="border-color:rgba(255,71,87,0.2)">
      <h2>💪 主力行为</h2>
      <div class="code">波段操作建议</div>
      <span class="badge" style="background:rgba(255,71,87,0.15);color:#ff6b81">吸筹·拉升·出货</span>
    </a>
  </div>
  <div class="footer">数据来源 Tushare Pro · 更新于 2026-06-30 · 中芯 | 兆易 | 金风 | 铂力特</div>
</div>
</body>
</html>
