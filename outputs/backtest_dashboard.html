series:series
});
}

function buildStockPanels(){
var tabsHtml='';
keys.forEach(function(k,i){
tabsHtml+='<div class="tab'+(i===0?' active':'')+'" onclick="switchStock(\''+k+'\')">'+RESULTS[k].name+'</div>';
});
document.getElementById('stockTabs').innerHTML=tabsHtml;

var panelsHtml='';
keys.forEach(function(k,i){
var r=RESULTS[k],m=r.metrics;
panelsHtml+='<div class="stock-panel" id="panel-'+k+'" style="'+(i===0?'':'display:none')+'">'
+'<div class="card"><div class="card-title">'+r.name+' ('+r.code+') 绩效指标</div>'
+'<div class="summary-grid">'
+'<div class="metric"><div class="mlabel">总收益</div><div class="mvalue '+(m.total_return>=0?'red':'green')+'">'+m.total_return+'%</div></div>'
+'<div class="metric"><div class="mlabel">买入持有</div><div class="mvalue red">'+m.buy_hold_return+'%</div></div>'
+'<div class="metric"><div class="mlabel">胜率</div><div class="mvalue '+(m.win_rate>=50?'red':'green')+'">'+m.win_rate+'%</div></div>'
+'<div class="metric"><div class="mlabel">盈亏比</div><div class="mvalue '+(m.profit_factor>=1.5?'red':'gray')+'">'+m.profit_factor+'</div></div>'
+'<div class="metric"><div class="mlabel">交易笔数</div><div class="mvalue gray">'+m.total_trades+'</div></div>'
+'<div class="metric"><div class="mlabel">最大回撤</div><div class="mvalue green">-'+m.max_drawdown+'%</div></div>'
+'<div class="metric"><div class="mlabel">夏普比率</div><div class="mvalue '+(m.sharpe_ratio>=1?'red':'gray')+'">'+m.sharpe_ratio+'</div></div>'
+'<div class="metric"><div class="mlabel">平均持有</div><div class="mvalue gray">'+m.avg_hold_days+'天</div></div>'
+'</div></div>'

+'<div class="card"><div class="card-title">'+r.name+' 资金曲线 vs 买入持有</div>'
+'<div class="chart-wrap" id="eq-'+k+'"></div></div>'

+'<div class="card"><div class="card-title">交易明细 ('+r.trades.length+' 笔)</div>'
+'<table class="trade-table"><thead><tr><th>#</th><th>买入日</th><th>买价</th><th>卖出日</th><th>卖价</th><th>持有</th><th>盈亏</th><th>盈亏%</th><th>结果</th><th>买入原因</th><th>卖出原因</th></tr></thead><tbody>';
r.trades.forEach(function(t,i){
panelsHtml+='<tr><td>'+(i+1)+'</td><td>'+fmtDate(t.entry_date)+'</td><td>'+t.entry_price+'</td><td>'+fmtDate(t.exit_date)+'</td><td>'+t.exit_price+'</td><td>'+t.hold_days+'天</td>'
+'<td style="color:'+(t.pnl>=0?'#ff4757':'#2ed573')+';font-weight:600">'+(t.pnl>=0?'+':'')+fmtMoney(t.pnl)+'</td>'
+'<td style="color:'+(t.pnl_pct>=0?'#ff4757':'#2ed573')+'">'+(t.pnl_pct>=0?'+':'')+t.pnl_pct+'%</td>'
+'<td><span class="tag '+(t.win?'win':'loss')+'">'+(t.win?'盈':'亏')+'</span></td>'
+'<td style="font-size:11px;color:#666">'+t.buy_reason+'</td>'
+'<td style="font-size:11px;color:#666">'+t.sell_reason+'</td></tr>';
});
panelsHtml+='</tbody></table></div></div>';
});
document.getElementById('stockPanels').innerHTML=panelsHtml;

keys.forEach(function(k){
var r=RESULTS[k];
var chart=echarts.init(document.getElementById('eq-'+k));
var dates=r.equity_curve.map(function(e){return fmtDate(e.date)});
var eq=r.equity_curve.map(function(e){return e.equity});
var initEq=r.equity_curve[0].equity;
var bh=r.equity_curve.map(function(e){return Math.round(initEq*(e.close/r.equity_curve[0].close))});
chart.setOption({
tooltip:{trigger:'axis',formatter:function(p){var s='<b>'+p[0].axisValue+'</b>';p.forEach(function(d){s+='<br>'+d.marker+d.seriesName+': ¥'+fmtMoney(d.value)});return s}},
legend:{top:0,textStyle:{fontSize:11}},
grid:{left:'8%',right:'3%',top:36,bottom:50},
xAxis:{type:'category',data:dates,axisLabel:{fontSize:10,interval:40}},
yAxis:{type:'value',axisLabel:{formatter:function(v){return fmtMoney(v)},fontSize:10},splitLine:{lineStyle:{color:'#eee',type:'dashed'}}},
dataZoom:[{type:'inside',start:0,end:100},{type:'slider',bottom:0,height:18}],
series:[
{name:'策略资金',type:'line',data:eq,smooth:true,symbol:'none',lineStyle:{width:2,color:'#1a1a2e'},areaStyle:{color:'rgba(26,26,46,0.06)'}},
{name:'买入持有',type:'line',data:bh,smooth:true,symbol:'none',lineStyle:{width:1.5,color:'#999',type:'dashed'}}
]
});
});
}

function switchStock(k){
document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('active')});
document.querySelectorAll('.stock-panel').forEach(function(p){p.style.display='none'});
event.target.classList.add('active');
document.getElementById('panel-'+k).style.display='';
}

buildCompareTable();
buildEquityChart();
buildStockPanels();
window.addEventListener('resize',function(){
echarts.getInstanceByDom(document.getElementById('equityChart')).resize();
keys.forEach(function(k){
var c=echarts.getInstanceByDom(document.getElementById('eq-'+k));
if(c)c.resize();
});
});
</script>
</body>
</html>
